<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>選擇排序法 - 進階互動教學</title>
    <style>
        :root {
            --primary: #8e44ad;
            --secondary: #27ae60;
            --accent: #e67e22;
            --bg: #f4f7f6;
            --dark: #2c3e50;
        }

        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background-color: var(--bg);
            color: var(--dark);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        h1 { color: var(--primary); margin: 0; }

        .title-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .title-header h1 {
            flex: 1;
        }

        .back-link {
            display: inline-block;
            padding: 10px 20px;
            background: #95a5a6;
            color: #fff !important;
            text-decoration: none;
            border-radius: 5px;
            transition: background 0.3s;
            font-size: 14px;
            white-space: nowrap;
        }

        .back-link:hover {
            background: #7f8c8d;
        }

        /* 控制面板 */
        .control-panel {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            background: #f9f9f9;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .input-group { display: flex; flex-direction: column; gap: 8px; }
        
        input[type="text"] {
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }

        .button-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 10px;
        }

        button {
            padding: 10px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        .btn-primary { background: var(--primary); color: white; }
        .btn-success { background: var(--secondary); color: white; }
        .btn-accent { background: var(--accent); color: white; }
        .btn-step { background: #9b59b6; color: white; }
        
        button:hover:not(:disabled) { opacity: 0.8; transform: translateY(-1px); }
        button:disabled { background: #ccc; cursor: not-allowed; }

        /* 視覺化區塊 */
        .visualizer-box {
            height: 300px;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 8px;
            margin: 30px 0;
            border-bottom: 3px solid var(--dark);
            padding-bottom: 5px;
        }

        .bar {
            width: 40px;
            background: var(--primary);
            display: flex;
            align-items: flex-end;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 14px;
            border-radius: 5px 5px 0 0;
            transition: height 0.3s, background-color 0.3s;
            padding-bottom: 5px;
        }

        /* 步驟紀錄 */
        .status-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-weight: bold;
        }

        #log-container {
            height: 150px;
            overflow-y: auto;
            background: #2d3436;
            color: #bdc3c7;
            padding: 15px;
            border-radius: 8px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 13px;
        }

        .log-swap { color: #ff7675; }
        .log-compare { color: #f1c40f; }
        .log-done { color: #55efc4; }

        input[type="range"] { width: 100%; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div class="title-header">
        <h1>選擇排序法 (Selection Sort) 互動平台</h1>
        <a href="index.html" class="back-link">← 返回首頁</a>
    </div>

    <div class="control-panel">
        <div class="input-group">
            <label><strong>自定義數字 (逗號隔開):</strong></label>
            <input type="text" id="userInput" placeholder="例如: 45, 12, 89, 3, 27">
            <div class="button-group">
                <button class="btn-primary" onclick="initArrayFromInput()">套用並重置</button>
                <button style="background: #95a5a6; color:white;" onclick="generateRandom()">隨機產生</button>
            </div>
        </div>

        <div class="input-group">
            <label><strong>動畫速度 (越左越快):</strong></label>
            <input type="range" id="speedRange" min="50" max="1500" value="500" style="direction: rtl;">
            <div class="button-group">
                <button id="autoBtn" class="btn-success" onclick="startAuto()">自動執行</button>
                <button id="stepBtn" class="btn-step" onclick="triggerNextStep()">單步執行</button>
                <button class="btn-accent" onclick="window.location.reload()">重新整理</button>
            </div>
        </div>
    </div>

    <div class="status-info">
        <span id="current-action">狀態：等待開始</span>
        <span id="step-count">步數：0</span>
    </div>
    <div class="visualizer-box" id="chart"></div>

    <div id="log-container">
        <div>系統就緒，請輸入數字或點擊自動執行。</div>
    </div>
</div>
<script>
    let data = [];
    let isSorting = false;
    let stepResolver = null; // 用於單步執行的 Promise 控制
    let mode = 'idle'; // 'auto', 'step', 'idle'
    let totalSteps = 0;

    const chart = document.getElementById('chart');
    const logBox = document.getElementById('log-container');
    const actionText = document.getElementById('current-action');
    const stepText = document.getElementById('step-count');

    // 初始化：隨機產生
    function generateRandom() {
        const randomData = Array.from({length: 10}, () => Math.floor(Math.random() * 90) + 10);
        document.getElementById('userInput').value = randomData.join(', ');
        initArrayFromInput();
    }

    // 初始化：讀取輸入
    function initArrayFromInput() {
        const input = document.getElementById('userInput').value;
        data = input.split(',').map(n => parseInt(n.trim())).filter(n => !isNaN(n));
        
        if (data.length === 0) {
            alert("請輸入有效的數字！");
            return;
        }
        
        renderBars();
        logBox.innerHTML = '<div>陣列已重置。</div>';
        totalSteps = 0;
        updateUI(0, "準備就緒");
        isSorting = false;
        mode = 'idle';
    }

    // 渲染長條圖
    function renderBars() {
        chart.innerHTML = '';
        const maxVal = Math.max(...data);
        data.forEach((val, i) => {
            const bar = document.createElement('div');
            bar.className = 'bar';
            bar.id = `bar-${i}`;
            bar.style.height = `${(val / maxVal) * 100}%`;
            bar.innerText = val;
            chart.appendChild(bar);
        });
    }

    // 更新狀態文字與紀錄
    function updateUI(stepInc, msg, className = "") {
        totalSteps += stepInc;
        stepText.innerText = `步數：${totalSteps}`;
        actionText.innerText = `狀態：${msg}`;
        const entry = document.createElement('div');
        if(className) entry.className = className;
        entry.innerText = `> ${msg}`;
        logBox.prepend(entry);
    }

    // 等待函數 (支援自動/單步)
    function wait() {
        if (mode === 'step') {
            return new Promise(resolve => {
                stepResolver = resolve;
            });
        } else {
            const ms = document.getElementById('speedRange').value;
            return new Promise(resolve => setTimeout(resolve, ms));
        }
    }

    // 觸發下一步 (給按鈕點擊)
    function triggerNextStep() {
        if (!isSorting) {
            mode = 'step';
            selectionSort();
            return;
        }
        if (stepResolver) {
            const resolve = stepResolver;
            stepResolver = null;
            resolve();
        }
    }

    // 開始自動執行
    function startAuto() {
        if (isSorting && mode === 'step') {
            mode = 'auto';
            if (stepResolver) triggerNextStep();
            return;
        }
        mode = 'auto';
        selectionSort();
    }

    // 選擇排序核心邏輯
    async function selectionSort() {
        if (isSorting) return;
        isSorting = true;
        
        const n = data.length;
        const bars = document.getElementsByClassName('bar');

        for (let i = 0; i < n - 1; i++) {
            let minIndex = i;
            
            // 標示當前要排序的位置
            bars[i].style.backgroundColor = '#f39c12';
            updateUI(0, `開始處理位置 ${i}`, "log-compare");
            await wait();

            // 尋找最小值
            for (let j = i + 1; j < n; j++) {
                bars[j].style.backgroundColor = '#f1c40f';
                updateUI(1, `比較 index ${j}(${data[j]}) 與最小值 index ${minIndex}(${data[minIndex]})`, "log-compare");
                await wait();

                if (data[j] < data[minIndex]) {
                    if (minIndex !== i) {
                        bars[minIndex].style.backgroundColor = 'var(--primary)';
                    }
                    minIndex = j;
                    bars[minIndex].style.backgroundColor = '#e74c3c';
                    updateUI(0, `→ 發現更小的值：${data[minIndex]} (index ${minIndex})`, "log-compare");
                    await wait();
                } else {
                    bars[j].style.backgroundColor = 'var(--primary)';
                }
            }

            // 交換（如果需要）
            if (minIndex !== i) {
                updateUI(0, `交換 ${data[i]} ↔ ${data[minIndex]}`, "log-swap");
                [data[i], data[minIndex]] = [data[minIndex], data[i]];
                
                bars[i].style.height = `${(data[i] / Math.max(...data)) * 100}%`;
                bars[i].innerText = data[i];
                bars[minIndex].style.height = `${(data[minIndex] / Math.max(...data)) * 100}%`;
                bars[minIndex].innerText = data[minIndex];
                await wait();
            }

            // 標示已完成
            bars[i].style.backgroundColor = 'var(--secondary)';
            updateUI(0, `元素 ${data[i]} 已歸位`, "log-done");
        }

        // 最後一個元素
        bars[n - 1].style.backgroundColor = 'var(--secondary)';
        
        isSorting = false;
        mode = 'idle';
        updateUI(0, "排序完整結束！", "log-done");
    }

    // 網頁載入時初始化
    window.onload = generateRandom;
</script>
</body>
</html>
