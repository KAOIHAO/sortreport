<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>合併排序法 - 進階互動教學</title>
    <style>
        :root {
            --primary: #1abc9c;
            --secondary: #2ecc71;
            --accent: #e74c3c;
            --bg: #f4f7f6;
            --dark: #2c3e50;
        }

        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background-color: var(--bg);
            color: var(--dark);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        h1 { color: var(--primary); margin: 0; }

        .title-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .title-header h1 {
            flex: 1;
        }

        .back-link {
            display: inline-block;
            padding: 10px 20px;
            background: #95a5a6;
            color: #fff !important;
            text-decoration: none;
            border-radius: 5px;
            transition: background 0.3s;
            font-size: 14px;
            white-space: nowrap;
        }

        .back-link:hover {
            background: #7f8c8d;
        }

        /* 控制面板 */
        .control-panel {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            background: #f9f9f9;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .input-group { display: flex; flex-direction: column; gap: 8px; }
        
        input[type="text"] {
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }

        .button-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 10px;
        }

        button {
            padding: 10px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        .btn-primary { background: var(--primary); color: white; }
        .btn-success { background: var(--secondary); color: white; }
        .btn-accent { background: var(--accent); color: white; }
        .btn-step { background: #9b59b6; color: white; }
        
        button:hover:not(:disabled) { opacity: 0.8; transform: translateY(-1px); }
        button:disabled { background: #ccc; cursor: not-allowed; }

        /* 視覺化區塊 */
        .visualizer-box {
            height: 300px;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 8px;
            margin: 30px 0;
            border-bottom: 3px solid var(--dark);
            padding-bottom: 5px;
        }

        .bar {
            width: 40px;
            background: var(--primary);
            display: flex;
            align-items: flex-end;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 14px;
            border-radius: 5px 5px 0 0;
            transition: height 0.3s, background-color 0.3s;
            padding-bottom: 5px;
        }

        /* 步驟紀錄 */
        .status-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-weight: bold;
        }

        #log-container {
            height: 150px;
            overflow-y: auto;
            background: #2d3436;
            color: #bdc3c7;
            padding: 15px;
            border-radius: 8px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 13px;
        }

        .log-merge { color: #55efc4; }
        .log-compare { color: #f1c40f; }
        .log-done { color: #55efc4; }
        .log-divide { color: #a29bfe; }

        input[type="range"] { width: 100%; cursor: pointer; }

        /* 統計信息面板 */
        .stats-panel {
            background: #f0f8f7;
            border: 2px solid var(--primary);
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 15px;
        }

        .stat-item {
            text-align: center;
            padding: 10px;
            background: white;
            border-radius: 5px;
            border-left: 4px solid var(--primary);
        }

        .stat-label {
            font-size: 12px;
            color: #7f8c8d;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: var(--primary);
            font-family: 'Courier New', monospace;
        }

        .info-box {
            background: #e8f4f0;
            border-left: 4px solid var(--primary);
            padding: 15px;
            border-radius: 5px;
            margin-top: 20px;
            font-size: 14px;
            color: var(--dark);
        }

        .info-box strong {
            color: var(--primary);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="title-header">
        <h1>合併排序法 (Merge Sort) 互動平台</h1>
        <a href="index.html" class="back-link">← 返回首頁</a>
    </div>

    <div class="control-panel">
        <div class="input-group">
            <label><strong>自定義數字 (逗號隔開):</strong></label>
            <input type="text" id="userInput" placeholder="例如: 45, 12, 89, 3, 27">
            <div class="button-group">
                <button class="btn-primary" onclick="initArrayFromInput()">套用並重置</button>
                <button style="background: #95a5a6; color:white;" onclick="generateRandom()">隨機產生</button>
            </div>
        </div>

        <div class="input-group">
            <label><strong>動畫速度 (越左越快):</strong></label>
            <input type="range" id="speedRange" min="50" max="1500" value="500" style="direction: rtl;">
            <div class="button-group">
                <button id="autoBtn" class="btn-success" onclick="startAuto()">自動執行</button>
                <button id="stepBtn" class="btn-step" onclick="triggerNextStep()">單步執行</button>
                <button class="btn-accent" onclick="window.location.reload()">重新整理</button>
            </div>
        </div>
    </div>

    <div class="status-info">
        <span id="current-action">狀態：等待開始</span>
        <span id="step-count">步數：0</span>
    </div>
    <div class="visualizer-box" id="chart"></div>

    <div id="log-container">
        <div>系統就緒，請輸入數字或點擊自動執行。</div>
    </div>

    <div class="stats-panel">
        <div class="stat-item">
            <div class="stat-label">比較次數</div>
            <div class="stat-value" id="comparisons-stat">0</div>
        </div>
        <div class="stat-item">
            <div class="stat-label">交換次數</div>
            <div class="stat-value" id="swaps-stat">0</div>
        </div>
        <div class="stat-item">
            <div class="stat-label">執行時間</div>
            <div class="stat-value" id="time-stat">0 s</div>
        </div>
    </div>

    <div class="info-box">
        <strong>💡 合併排序法 (Merge Sort) 說明：</strong><br>
        合併排序是一種分治算法，通過將陣列分割成更小的部分，分別排序，再逐步合併回來形成最終的排序結果。時間複雜度為 O(n log n)。
    </div>
</div>

<script>
    let data = [];
    let originalData = [];
    let isSorting = false;
    let stepResolver = null;
    let mode = 'idle';
    let totalSteps = 0;

    // 統計變量
    let comparisons = 0;
    let swaps = 0;
    let startTime = 0;
    let endTime = 0;

    const chart = document.getElementById('chart');
    const logBox = document.getElementById('log-container');
    const actionText = document.getElementById('current-action');
    const stepText = document.getElementById('step-count');
    const comparisonsStatDiv = document.getElementById('comparisons-stat');
    const swapsStatDiv = document.getElementById('swaps-stat');
    const timeStatDiv = document.getElementById('time-stat');

    function initArrayFromInput() {
        const input = document.getElementById('userInput').value;
        data = input.split(',').map(n => parseInt(n.trim())).filter(n => !isNaN(n));
        
        if (data.length === 0) {
            alert("請輸入有效的數字！");
            return;
        }
        
        originalData = [...data];
        renderBars();
        logBox.innerHTML = '<div>陣列已重置。</div>';
        totalSteps = 0;
        
        // 重置統計變量
        comparisons = 0;
        swaps = 0;
        updateStatsDisplay();
        
        updateUI(0, "準備就緒");
        isSorting = false;
        mode = 'idle';
    }

    function renderBars() {
        chart.innerHTML = '';
        const maxVal = Math.max(...data);
        data.forEach((val, i) => {
            const bar = document.createElement('div');
            bar.className = 'bar';
            bar.id = `bar-${i}`;
            bar.style.height = `${(val / maxVal) * 100}%`;
            bar.innerText = val;
            chart.appendChild(bar);
        });
    }

    function updateUI(stepInc, msg, className = "") {
        totalSteps += stepInc;
        stepText.innerText = `步數：${totalSteps}`;
        actionText.innerText = `狀態：${msg}`;
        const entry = document.createElement('div');
        if(className) entry.className = className;
        entry.innerText = `> ${msg}`;
        logBox.prepend(entry);
    }

    function updateStatsDisplay() {
        comparisonsStatDiv.innerText = comparisons;
        swapsStatDiv.innerText = swaps;
        
        if (startTime > 0 && endTime > 0) {
            const duration = ((endTime - startTime) / 1000).toFixed(2);
            timeStatDiv.innerText = duration + ' s';
        }
    }

    function wait() {
        if (mode === 'step') {
            return new Promise(resolve => {
                stepResolver = resolve;
            });
        } else {
            const ms = document.getElementById('speedRange').value;
            return new Promise(resolve => setTimeout(resolve, ms));
        }
    }

    function triggerNextStep() {
        if (!isSorting) {
            mode = 'step';
            mergeSort();
            return;
        }
        if (stepResolver) {
            const resolve = stepResolver;
            stepResolver = null;
            resolve();
        }
    }

    function startAuto() {
        if (isSorting && mode === 'step') {
            mode = 'auto';
            if (stepResolver) triggerNextStep();
            return;
        }
        mode = 'auto';
        mergeSort();
    }

    async function colorize(indices, color) {
        const bars = document.getElementsByClassName('bar');
        indices.forEach(i => {
            if (i >= 0 && i < bars.length) {
                bars[i].style.backgroundColor = color;
            }
        });
        await wait();
    }

    async function mergeSort() {
        if (isSorting) return;
        isSorting = true;
        
        // 重置統計變量
        comparisons = 0;
        swaps = 0;
        startTime = performance.now();
        
        updateUI(1, "開始合併排序", "log-divide");
        await mergeSortHelper(0, data.length - 1);
        
        endTime = performance.now();
        updateStatsDisplay();
        
        isSorting = false;
        mode = 'idle';
        
        const bars = document.getElementsByClassName('bar');
        for (let i = 0; i < bars.length; i++) {
            bars[i].style.backgroundColor = 'var(--secondary)';
        }
        updateUI(0, "排序完成！", "log-done");
    }

    async function mergeSortHelper(left, right) {
        if (left >= right) return;

        const mid = Math.floor((left + right) / 2);
        
        updateUI(1, `分割: [${left}...${mid}] 和 [${mid+1}...${right}]`, "log-divide");
        await colorize(range(left, mid + 1), '#f1c40f');
        await colorize(range(mid + 1, right + 1), '#a29bfe');

        await mergeSortHelper(left, mid);
        await mergeSortHelper(mid + 1, right);
        await merge(left, mid, right);
    }

    async function merge(left, mid, right) {
        const leftArr = data.slice(left, mid + 1);
        const rightArr = data.slice(mid + 1, right + 1);

        updateUI(1, `合併 [${leftArr}] 和 [${rightArr}]`, "log-merge");

        let i = 0, j = 0, k = left;
        const bars = document.getElementsByClassName('bar');

        while (i < leftArr.length && j < rightArr.length) {
            comparisons++;
            
            // 標示比較
            bars[left + i].style.backgroundColor = '#f1c40f';
            bars[mid + 1 + j].style.backgroundColor = '#a29bfe';
            updateUI(1, `比較 ${leftArr[i]} 與 ${rightArr[j]}`, "log-compare");
            updateStatsDisplay();
            
            await wait();

            if (leftArr[i] <= rightArr[j]) {
                swaps++;
                data[k] = leftArr[i];
                updateUI(0, `放置 ${leftArr[i]} 到位置 ${k}`, "log-merge");
                bars[k].style.height = `${(leftArr[i] / Math.max(...originalData)) * 100}%`;
                bars[k].innerText = leftArr[i];
                bars[k].style.backgroundColor = '#55efc4';
                updateStatsDisplay();
                i++;
            } else {
                swaps++;
                data[k] = rightArr[j];
                updateUI(0, `放置 ${rightArr[j]} 到位置 ${k}`, "log-merge");
                bars[k].style.height = `${(rightArr[j] / Math.max(...originalData)) * 100}%`;
                bars[k].innerText = rightArr[j];
                bars[k].style.backgroundColor = '#55efc4';
                updateStatsDisplay();
                j++;
            }
            k++;
            await wait();
        }

        // 複製剩餘元素
        while (i < leftArr.length) {
            swaps++;
            data[k] = leftArr[i];
            bars[k].style.height = `${(leftArr[i] / Math.max(...originalData)) * 100}%`;
            bars[k].innerText = leftArr[i];
            bars[k].style.backgroundColor = '#55efc4';
            updateUI(0, `複製剩餘 ${leftArr[i]}`, "log-merge");
            updateStatsDisplay();
            i++;
            k++;
            await wait();
        }

        while (j < rightArr.length) {
            swaps++;
            data[k] = rightArr[j];
            bars[k].style.height = `${(rightArr[j] / Math.max(...originalData)) * 100}%`;
            bars[k].innerText = rightArr[j];
            bars[k].style.backgroundColor = '#55efc4';
            updateUI(0, `複製剩餘 ${rightArr[j]}`, "log-merge");
            updateStatsDisplay();
            j++;
            k++;
            await wait();
        }
    }

    function range(start, end) {
        return Array.from({length: end - start}, (_, i) => start + i);
    }

    function generateRandom() {
        const size = Math.floor(Math.random() * 8) + 5; // 5-12 個數字
        data = Array.from({length: size}, () => Math.floor(Math.random() * 100) + 1);
        originalData = [...data];
        renderBars();
        logBox.innerHTML = '<div>已產生隨機陣列。</div>';
        totalSteps = 0;
        comparisons = 0;
        swaps = 0;
        updateStatsDisplay();
        updateUI(0, "準備就緒");
        isSorting = false;
        mode = 'idle';
    }

    window.onload = generateRandom;
</script>

</body>
</html>
