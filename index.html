<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>排序法互動教學平台</title>
    <style>
        :root {
            --primary: #3498db;
            --secondary: #2ecc71;
            --dark: #2c3e50;
            --light: #ecf0f1;
        }

        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: var(--dark);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            background: white;
            padding: 50px 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 600px;
            width: 90%;
        }

        h1 {
            color: var(--primary);
            font-size: 2.5em;
            margin: 0 0 15px 0;
        }

        .subtitle {
            color: #7f8c8d;
            font-size: 1.2em;
            margin-bottom: 40px;
        }

        .card-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            border: none;
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            text-decoration: none;
            color: white;
            font-weight: bold;
            font-size: 1.1em;
            transition: 0.3s;
            cursor: pointer;
            aspect-ratio: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .card-bubble {
            background: linear-gradient(135deg, #3498db 0%, #2980b9 100%);
        }

        .card-selection {
            background: linear-gradient(135deg, #9b59b6 0%, #8e44ad 100%);
        }

        .card-insertion {
            background: linear-gradient(135deg, #e67e22 0%, #d35400 100%);
        }
        .card-merge {
            background: linear-gradient(135deg, #1abc9c 0%, #16a085 100%);
        }
        .card-radix {
            background: linear-gradient(135deg, #f39c12 0%, #d68910 100%);
        }

        .card-benchmark {
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
        }

        .card-icon {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .nav-return {
            margin-top: 30px;
            color: white;
            font-size: 0.95em;
        }

        .nav-return button {
            background: rgba(255,255,255,0.2);
            color: white;
            border: 2px solid white;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            display: inline-block;
            width: auto;
        }

        .nav-return button:hover {
            background: white;
            color: #667eea;
        }

        .nav-return button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🎓 排序法互動教學平台</h1>
    <p class="subtitle">選擇一個排序演算法，開始互動式學習</p>

    <div class="card-grid">
        <a href="bubble_sort.html" class="card card-bubble">
            <div class="card-icon">🫧</div>
            <div>氣泡排序法<br><small style="font-size: 0.8em;">Bubble Sort</small></div>
        </a>
        <a href="insertion_sort.html" class="card card-insertion">
            <div class="card-icon">📥</div>
            <div>插入排序法<br><small style="font-size: 0.8em;">Insertion Sort</small></div>
        </a>
        <a href="selection_sort.html" class="card card-selection">
            <div class="card-icon">🎯</div>
            <div>選擇排序法<br><small style="font-size: 0.8em;">Selection Sort</small></div>
        </a>
        <a href="merge_sort.html" class="card card-merge">
            <div class="card-icon">🔀</div>
            <div>合併排序法<br><small style="font-size: 0.8em;">Merge Sort</small></div>
        </a>
        <a href="radix_sort.html" class="card card-radix">
            <div class="card-icon">🔢</div>
            <div>基數排序法<br><small style="font-size: 0.8em;">Radix Sort</small></div>
        </a>
    </div>

    <!-- 效能測試區域 -->
    <div style="margin-bottom: 20px;">
        <a href="performance_benchmark.html" class="card card-benchmark">
            <div class="card-icon">⏱️</div>
            <div>效能測試實驗<br><small style="font-size: 0.8em;">Performance Benchmark</small></div>
        </a>
    </div>

    <div class="nav-return">
        <button onclick="location.href='index.html'" disabled>您已在首頁</button>
    </div>
</div>

</body>
</html>
